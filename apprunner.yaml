version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r backend/requirements.txt
run:
  runtime-version: 3.11
  command: cd backend && uvicorn main_aws:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: DYNAMO_TABLE_PREFIX
      value: mm_
