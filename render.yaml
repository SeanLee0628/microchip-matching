databases:
  - name: microchip-db
    plan: free
    databaseName: microchip_matching
    user: microchip_user

services:
  - type: web
    name: microchip-matching-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: microchip-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: microchip-matching-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
