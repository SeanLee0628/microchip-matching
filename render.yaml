databases:
  - name: microchip-db
    plan: free
    databaseName: microchip_matching
    user: microchip_user

services:
  - type: web
    name: microchip-matching
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: microchip-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "18.20.0"
